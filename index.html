<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Scroller - BGM Added</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Orbitron', sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: #000814;
            display: block;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            max-width: 100%;
            max-height: 100%;
            border: 1px solid #00f2ff;
        }
        .ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f2ff;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 10px #00f2ff;
            display: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            color: #00f2ff;
            z-index: 20;
            backdrop-filter: blur(8px);
        }
        #start-screen {
            background: linear-gradient(180deg, rgba(0,8,20,1) 0%, rgba(0,20,40,1) 100%);
        }
        #start-screen::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 21;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .cyber-button {
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            font-size: 1rem;
            letter-spacing: 2px;
            position: relative;
            z-index: 25;
            min-width: 200px;
        }
        .cyber-button:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 30px #00f2ff;
        }
        .cyber-button.hard {
            border-color: #ff0055;
            color: #ff0055;
        }
        .cyber-button.hard:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 30px #ff0055;
        }
        
        .touch-controls, .action-btns {
            position: absolute;
            display: none;
            gap: 20px;
            pointer-events: auto;
            z-index: 15;
        }
        .touch-controls { bottom: 30px; left: 30px; }
        .action-btns { bottom: 30px; right: 30px; flex-direction: column; }

        .btn {
            width: 70px; height: 70px;
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid #00f2ff;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00f2ff;
            user-select: none;
            font-weight: bold;
        }
        .btn:active { background: rgba(0, 242, 255, 0.4); }
        .btn-fire { border-color: #ff00ff; color: #ff00ff; background: rgba(255, 0, 255, 0.1); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer" id="ui-layer">
        <div>DATA_RECOVERED: <span id="score">0</span> | <span id="diff-label">NORMAL</span></div>
    </div>

    <div id="start-screen" class="overlay">
        <h1 class="text-6xl font-bold mb-4 tracking-[0.2em] text-center">CYBER<br>ESCAPE</h1>
        <p class="text-sm mb-8 text-cyan-500 opacity-70 tracking-widest text-center">CHOOSE_DIFFICULTY_LEVEL</p>
        
        <div class="flex flex-col gap-4">
            <button onclick="startGame('EASY')" class="cyber-button">EASY</button>
            <button onclick="startGame('NORMAL')" class="cyber-button">NORMAL</button>
            <button onclick="startGame('HARD')" class="cyber-button hard">HARD</button>
        </div>

        <div class="mt-8 text-xs opacity-50 text-center">
            [WASD/ARROWS] MOVE/JUMP | [SPACE/K] SHOOT
        </div>
    </div>

    <div id="message-overlay" class="overlay" style="display: none;">
        <h1 id="status-text" class="text-5xl font-bold mb-8 tracking-widest">SYSTEM_FAILURE</h1>
        <button onclick="resetGame()" class="cyber-button">BACK_TO_MENU</button>
    </div>

    <div class="touch-controls" id="touch-move">
        <div class="btn" id="leftBtn">L</div>
        <div class="btn" id="rightBtn">R</div>
    </div>
    <div class="action-btns" id="touch-action">
        <div class="btn btn-fire" id="fireBtn">SHOOT</div>
        <div class="btn" id="upBtn">JUMP</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const diffLabel = document.getElementById('diff-label');
    const messageOverlay = document.getElementById('message-overlay');
    const startScreen = document.getElementById('start-screen');
    const uiLayer = document.getElementById('ui-layer');
    const statusText = document.getElementById('status-text');
    const touchMove = document.getElementById('touch-move');
    const touchAction = document.getElementById('touch-action');

    const GAME_WIDTH = 800;
    const GAME_HEIGHT = 450;
    const GRAVITY = 0.55;
    const FRICTION = 0.92;
    const JUMP_FORCE = -11;
    const MAX_MOVE_SPEED = 6;
    const ACCELERATION = 0.3;
    const BULLET_SPEED = 12;

    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;

    let score = 0;
    let isGameOver = false;
    let gameRunning = false;
    let cameraX = 0;
    let keys = {};
    let canShoot = true;
    let canJump = true;
    let goalX = 5000;
    let currentDifficulty = 'NORMAL';

    // --- Assets ---
    const droneImage = new Image();
    droneImage.src = 'https://raw.githubusercontent.com/hw26a060/gemejam/main/ufo_05.png';
    let droneLoaded = false;
    droneImage.onload = () => { droneLoaded = true; };

    // --- Audio System ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let gunSoundBuffer = null;
    let bgmBuffer = null;
    let bgmSource = null;

    const SE_URL = 'https://raw.githubusercontent.com/hw26a060/gemejam/main/maou_se_battle_gun03.mp3';
    // BGM URL (GitHub raw link for direct access)
    const BGM_URL = 'https://raw.githubusercontent.com/hw26a060/gemejam/main/maou_bgm_cyber43.mp3';

    async function loadSounds() {
        try {
            // Load SE
            const seResponse = await fetch(SE_URL);
            const seArrayBuffer = await seResponse.arrayBuffer();
            gunSoundBuffer = await audioCtx.decodeAudioData(seArrayBuffer);

            // Load BGM
            const bgmResponse = await fetch(BGM_URL);
            const bgmArrayBuffer = await bgmResponse.arrayBuffer();
            bgmBuffer = await audioCtx.decodeAudioData(bgmArrayBuffer);
        } catch (e) {
            console.error("Failed to load sound files", e);
        }
    }
    loadSounds();

    function playBGM() {
        if (!bgmBuffer) return;
        if (bgmSource) bgmSource.stop();
        
        bgmSource = audioCtx.createBufferSource();
        bgmSource.buffer = bgmBuffer;
        bgmSource.loop = true;
        
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); // Lower volume for BGM
        
        bgmSource.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        bgmSource.start(0);
    }

    function stopBGM() {
        if (bgmSource) {
            bgmSource.stop();
            bgmSource = null;
        }
    }

    function playGunSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (gunSoundBuffer) {
            const source = audioCtx.createBufferSource();
            source.buffer = gunSoundBuffer;
            const gainNode = audioCtx.createGain();
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            source.start(0);
        } else {
            playSound(150, 'square', 0.1);
        }
    }

    function playSound(freq, type, duration, volume = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // --- Start / Reset Logic ---
    function startGame(diff) {
        currentDifficulty = diff;
        diffLabel.innerText = diff;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        playBGM(); // Start background music

        startScreen.style.display = 'none';
        uiLayer.style.display = 'block';
        if (window.innerWidth <= 768) {
            touchMove.style.display = 'flex';
            touchAction.style.display = 'flex';
        }
        gameRunning = true;
        initLevel();
        requestAnimationFrame(gameLoop);
    }

    function resetGame() {
        stopBGM(); // Stop music when returning to menu
        gameRunning = false;
        messageOverlay.style.display = 'none';
        startScreen.style.display = 'flex';
        uiLayer.style.display = 'none';
        score = 0;
        updateScore();
        player.reset();
        cameraX = 0;
        isGameOver = false;
    }

    // --- Input ---
    window.addEventListener('keydown', e => {
        if (!gameRunning) return;
        keys[e.code] = true;
        if ((e.code === 'ArrowUp' || e.code === 'KeyW') && canJump && !isGameOver) {
            player.jump();
            canJump = false;
        }
        if ((e.code === 'Space' || e.code === 'KeyK') && canShoot && !isGameOver) {
            shoot();
            canShoot = false;
        }
    });
    window.addEventListener('keyup', e => {
        keys[e.code] = false;
        if (e.code === 'ArrowUp' || e.code === 'KeyW') canJump = true;
        if (e.code === 'Space' || e.code === 'KeyK') canShoot = true;
    });

    const setupTouchBtn = (id, code) => {
        const btn = document.getElementById(id);
        if (!btn) return;
        btn.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (id === 'fireBtn') { if (canShoot && !isGameOver) { shoot(); canShoot = false; } }
            else if (id === 'upBtn') { if (!isGameOver) player.jump(); }
            else { keys[code] = true; }
        });
        btn.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            if (id === 'fireBtn') canShoot = true;
            else if (id !== 'upBtn') keys[code] = false; 
        });
    };
    setupTouchBtn('leftBtn', 'KeyA');
    setupTouchBtn('rightBtn', 'KeyD');
    setupTouchBtn('upBtn', 'KeyW');
    setupTouchBtn('fireBtn', 'Space');

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8;
            this.life = 1.0;
            this.decay = Math.random() * 0.05 + 0.02;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10; ctx.shadowColor = this.color;
            ctx.beginPath(); ctx.arc(this.x - cameraX, this.y, 2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    class Bullet {
        constructor(x, y, dir) {
            this.x = x; this.y = y; this.vx = dir * BULLET_SPEED;
            this.active = true;
        }
        update() {
            this.x += this.vx;
            platforms.forEach(p => {
                if (this.x > p.x && this.x < p.x + p.w && this.y > p.y && this.y < p.y + p.h) this.active = false;
            });
            enemies.forEach(e => {
                if (!e.dead && this.x > e.x && this.x < e.x + e.w && this.y > e.y && this.y < e.y + e.h) {
                    e.die(); this.active = false;
                }
            });
            if (Math.abs(this.x - player.x) > GAME_WIDTH) this.active = false;
        }
        draw() {
            ctx.fillStyle = '#ff00ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#ff00ff';
            ctx.beginPath(); ctx.arc(this.x - cameraX, this.y, 4, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    class EnemyBullet {
        constructor(x, y, vx, vy) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.active = true;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x > player.x && this.x < player.x + player.width &&
                this.y > player.y && this.y < player.y + player.height) {
                this.active = false; endGame(false);
            }
        }
        draw() {
            ctx.fillStyle = '#00f2ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#00f2ff';
            ctx.beginPath(); ctx.arc(this.x - cameraX, this.y, 5, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    class Player {
        constructor() {
            this.width = 40; this.height = 40;
            this.reset();
        }
        reset() {
            this.x = 100; this.y = 300; this.vx = 0; this.vy = 0;
            this.grounded = false; this.facing = 1; this.jumpCount = 0;
        }
        jump() {
            if (this.grounded || this.jumpCount < 2) {
                this.vy = JUMP_FORCE; this.jumpCount++; this.grounded = false;
                playSound(400, 'triangle', 0.2);
            }
        }
        update() {
            if (keys['KeyD'] || keys['ArrowRight']) { 
                this.vx += ACCELERATION; 
                this.facing = 1; 
            }
            else if (keys['KeyA'] || keys['ArrowLeft']) { 
                this.vx -= ACCELERATION; 
                this.facing = -1; 
            }
            else { 
                this.vx *= FRICTION; 
            }

            if (this.vx > MAX_MOVE_SPEED) this.vx = MAX_MOVE_SPEED;
            if (this.vx < -MAX_MOVE_SPEED) this.vx = -MAX_MOVE_SPEED;

            this.vy += GRAVITY;
            this.x += this.vx; this.y += this.vy;

            if (this.x < 0) this.x = 0;
            this.grounded = false;
            platforms.forEach(p => {
                if (this.x < p.x + p.w && this.x + this.width > p.x &&
                    this.y + this.height > p.y && this.y + this.height < p.y + p.h + this.vy) {
                    if (this.vy > 0) {
                        this.grounded = true; this.jumpCount = 0; this.vy = 0; this.y = p.y - this.height;
                    }
                }
            });
            if (this.y > GAME_HEIGHT) endGame(false);
        }
        draw() {
            ctx.save();
            ctx.translate(this.x - cameraX + this.width/2, this.y + this.height/2);
            if(this.facing === -1) ctx.scale(-1, 1);
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(-15, -15, 30, 30);
            ctx.fillStyle = '#00f2ff'; ctx.fillRect(-12, 0, 4, 10); ctx.fillRect(8, 0, 4, 10);
            ctx.fillStyle = '#333'; ctx.fillRect(-10, -25, 20, 15);
            ctx.fillStyle = '#ff0000'; ctx.fillRect(-6, -20, 4, 4); ctx.fillRect(2, -20, 4, 4);
            ctx.restore();
        }
    }

    class Enemy {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.startX = x; this.startY = y; this.type = type;
            this.w = 40; this.h = 40; this.dead = false; this.shootTimer = Math.random() * 100;
            this.dir = 1; this.angle = 0;
        }
        update() {
            if (this.type === 'walker') {
                this.x += 1.5 * this.dir;
                if (Math.abs(this.x - this.startX) > 80) this.dir *= -1;
            } else {
                this.angle += 0.05;
                this.y = this.startY + Math.sin(this.angle) * 40;
            }
            this.shootTimer++;
            let shootInterval = currentDifficulty === 'HARD' ? 80 : (currentDifficulty === 'NORMAL' ? 120 : 180);
            if (this.shootTimer > shootInterval && Math.abs(this.x - player.x) < 500) {
                this.shoot(); this.shootTimer = 0;
            }
            if (player.x < this.x + this.w && player.x + player.width > this.x &&
                player.y < this.y + this.h && player.y + player.height > this.y) endGame(false);
        }
        die() {
            if (this.dead) return; this.dead = true; score += 200; updateScore();
            createExplosion(this.x + 20, this.y + 20, '#ff0055', 10);
            playSound(150, 'sawtooth', 0.4);
        }
        shoot() {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            enemyBullets.push(new EnemyBullet(this.x + 20, this.y + 20, Math.cos(angle)*4, Math.sin(angle)*4));
        }
        draw() {
            ctx.save();
            ctx.translate(this.x - cameraX + 20, this.y + 20);
            
            if (this.type === 'walker') {
                ctx.shadowBlur = 10; ctx.shadowColor = '#ff0055';
                ctx.fillStyle = '#1a000d'; ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.roundRect(-20, -20, 40, 40, 4); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#ff0055';
                ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
            } else {
                if (droneLoaded) {
                    ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(0, 242, 255, 0.5)';
                    ctx.drawImage(droneImage, -25, -25, 50, 50);
                } else {
                    ctx.shadowBlur = 15; ctx.shadowColor = '#ff0055';
                    ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-10, -5); ctx.lineTo(10, -5); ctx.lineTo(15, 10); ctx.lineTo(-15, 10);
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                }

                const brightness = Math.sin(Date.now() / 150) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(0, 242, 255, ${brightness})`;
                ctx.beginPath(); ctx.arc(0, 8, 3, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }
    }

    const player = new Player();
    let platforms = [], enemies = [], bullets = [], enemyBullets = [], particles = [];

    function createExplosion(x, y, color, count) {
        for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
    }

    function shoot() {
        playGunSound();
        bullets.push(new Bullet(player.facing === 1 ? player.x + player.width : player.x, player.y + 20, player.facing));
    }

    function initLevel() {
        platforms = [
            {x: 0, y: 400, w: 1000, h: 50},
            {x: 1100, y: 320, w: 300, h: 20},
            {x: 1500, y: 250, w: 300, h: 20},
            {x: 1900, y: 380, w: 800, h: 70},
            {x: 2800, y: 300, w: 400, h: 20},
            {x: 3300, y: 400, w: 1700, h: 50},
        ];
        
        enemies = [];
        bullets = []; enemyBullets = []; particles = [];

        // Generate enemies based on difficulty
        let walkerGap = currentDifficulty === 'HARD' ? 300 : (currentDifficulty === 'NORMAL' ? 500 : 800);
        let droneGap = currentDifficulty === 'HARD' ? 400 : (currentDifficulty === 'NORMAL' ? 700 : 1200);

        // Safe zone for player spawn (x = 100)
        const SPAWN_SAFE_ZONE = 300;

        // Populate walkers on platforms
        platforms.forEach(p => {
            if (p.w > 200) {
                for (let ex = p.x + 100; ex < p.x + p.w - 100; ex += walkerGap) {
                    if (Math.abs(ex - player.x) > SPAWN_SAFE_ZONE) {
                        enemies.push(new Enemy(ex, p.y - 40, 'walker'));
                    }
                }
            }
        });

        // Populate drones in the air
        for (let dx = 400; dx < goalX - 500; dx += droneGap) {
            if (Math.abs(dx - player.x) > SPAWN_SAFE_ZONE) {
                let dy = 100 + Math.random() * 200;
                enemies.push(new Enemy(dx, dy, 'drone'));
            }
        }
    }

    function updateScore() { scoreElement.innerText = score; }

    function endGame(victory) {
        isGameOver = true;
        statusText.innerText = victory ? "CONNECTION_SUCCESS" : "SYSTEM_FAILURE";
        messageOverlay.style.display = 'flex';
    }

    function drawGrid() {
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.1)';
        ctx.lineWidth = 1;
        for(let x = -cameraX % 40; x < GAME_WIDTH; x += 40) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GAME_HEIGHT); ctx.stroke();
        }
        for(let y = 0; y < GAME_HEIGHT; y += 40) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GAME_WIDTH, y); ctx.stroke();
        }
    }

    function gameLoop() {
        if (!gameRunning || isGameOver) return;
        player.update();
        cameraX += (player.x - GAME_WIDTH / 3 - cameraX) * 0.1;
        if (cameraX < 0) cameraX = 0;

        enemies = enemies.filter(e => !e.dead); enemies.forEach(e => e.update());
        bullets = bullets.filter(b => b.active); bullets.forEach(b => b.update());
        enemyBullets = enemyBullets.filter(eb => eb.active); enemyBullets.forEach(eb => eb.update());
        particles = particles.filter(p => p.life > 0); particles.forEach(p => p.update());

        if (player.x >= goalX - player.width) endGame(true);

        ctx.fillStyle = '#000814'; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        drawGrid();

        platforms.forEach(p => {
            ctx.fillStyle = '#001a2e'; ctx.strokeStyle = '#00f2ff';
            ctx.beginPath(); ctx.roundRect(p.x - cameraX, p.y, p.w, p.h, 2); ctx.fill(); ctx.stroke();
        });

        enemies.forEach(e => e.draw());
        bullets.forEach(b => b.draw());
        enemyBullets.forEach(eb => eb.draw());
        particles.forEach(p => p.draw());
        player.draw();

        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
